apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: smart-parking
  namespace: argocd
spec:
  description: Smart Parking dev and prod GitOps environments.
  sourceRepos:
    - https://github.com/Quickslot-Capstone-Project/Parking-System-ArgoCD.git
    - https://prometheus-community.github.io/helm-charts
    - https://grafana-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: dev
    - server: https://kubernetes.default.svc
      namespace: prod
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: kube-system
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
