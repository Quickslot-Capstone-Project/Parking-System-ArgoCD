apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard
    app.kubernetes.io/part-of: argo-rollouts
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-rollouts-dashboard
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard
    app.kubernetes.io/part-of: argo-rollouts
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - rollouts
      - rollouts/status
      - rollouts/finalizers
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - argoproj.io
    resources:
      - analysisruns
      - analysisruns/finalizers
      - experiments
      - experiments/finalizers
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - analysistemplates
      - clusteranalysistemplates
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - update
      - list
      - watch
      - patch
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-rollouts-dashboard
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard
    app.kubernetes.io/part-of: argo-rollouts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-rollouts-dashboard
subjects:
  - kind: ServiceAccount
    name: argo-rollouts-dashboard
    namespace: argo-rollouts
---
apiVersion: v1
kind: Service
metadata:
  name: argo-rollouts-dashboard-dev
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard-dev
    app.kubernetes.io/part-of: argo-rollouts
spec:
  ports:
    - port: 3100
      protocol: TCP
      targetPort: 3100
  selector:
    app.kubernetes.io/name: argo-rollouts-dashboard-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-rollouts-dashboard-dev
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard-dev
    app.kubernetes.io/part-of: argo-rollouts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-rollouts-dashboard-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo-rollouts-dashboard-dev
    spec:
      serviceAccountName: argo-rollouts-dashboard
      containers:
        - name: argo-rollouts-dashboard
          image: quay.io/argoproj/kubectl-argo-rollouts:latest
          args:
            - dashboard
            - --namespace
            - dev
            - --root-path
            - rollouts/dev
          ports:
            - containerPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: argo-rollouts-dashboard-prod
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard-prod
    app.kubernetes.io/part-of: argo-rollouts
spec:
  ports:
    - port: 3100
      protocol: TCP
      targetPort: 3100
  selector:
    app.kubernetes.io/name: argo-rollouts-dashboard-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-rollouts-dashboard-prod
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/component: argo-rollouts-dashboard
    app.kubernetes.io/name: argo-rollouts-dashboard-prod
    app.kubernetes.io/part-of: argo-rollouts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-rollouts-dashboard-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo-rollouts-dashboard-prod
    spec:
      serviceAccountName: argo-rollouts-dashboard
      containers:
        - name: argo-rollouts-dashboard
          image: quay.io/argoproj/kubectl-argo-rollouts:latest
          args:
            - dashboard
            - --namespace
            - prod
            - --root-path
            - rollouts/prod
          ports:
            - containerPort: 3100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-rollouts-dashboard-edge
  namespace: argo-rollouts
  annotations:
    alb.ingress.kubernetes.io/group.name: smart-parking-prod-edge
    alb.ingress.kubernetes.io/group.order: "11"
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /rollouts/dev
    alb.ingress.kubernetes.io/success-codes: "200-399"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /rollouts/dev
            pathType: Prefix
            backend:
              service:
                name: argo-rollouts-dashboard-dev
                port:
                  number: 3100
          - path: /rollouts/prod
            pathType: Prefix
            backend:
              service:
                name: argo-rollouts-dashboard-prod
                port:
                  number: 3100
