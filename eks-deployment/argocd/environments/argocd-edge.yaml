apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-parking-argocd-edge
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: smart-parking
  revisionHistoryLimit: 5
  source:
    repoURL: https://github.com/Quickslot-Capstone-Project/Parking-System-ArgoCD.git
    targetRevision: master
    path: eks-deployment/argocd/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
