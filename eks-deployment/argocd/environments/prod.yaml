apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-parking-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: smart-parking
  revisionHistoryLimit: 5
  source:
    repoURL: https://github.com/UST-Capstone-Project/Parking-System.git
    targetRevision: master
    path: eks-deployment/helm
    helm:
      releaseName: smart-parking-prod
      valueFiles:
        - values/argocd-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
