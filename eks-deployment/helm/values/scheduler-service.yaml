environment: ""

rollout:
  enabled: true

rolloutStrategy:
  default:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}
  dev:
    steps:
      - setWeight: 50
  prod:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}

schedulerService:
  enabled: true
  configMap:
    name: scheduler-configmap
    data:
      PORT: "4005"
      BOOKING_SERVICE_URL: "http://booking-service"
      AWS_REGION: "us-east-1"
      APPLICATION_SECRETS_MANAGER_SECRET_ID: "smart-parking-dev-application-secrets"
      INTERNAL_API_KEY: "smartparking_internal_key"
      CRON_SCHEDULE: "* * * * *"
  deployment:
    name: scheduler-deploy
    replicas: 1
    selectorLabels:
      app: sps-scheduler
    podLabels:
      app: sps-scheduler
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    containers:
      - name: scheduler-container
        image:
          repository: nimeshsv814/tf-scheduler-service
          tag: latest
        ports:
          - containerPort: 4005
        envFromConfigMaps:
          - scheduler-configmap
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  service:
    name: scheduler-service
    selectorLabels:
      app: sps-scheduler
    ports:
      - port: 80
        targetPort: 4005
    type: ClusterIP
