schedulerService:
  enabled: true
  configMap:
    name: scheduler-configmap
    data:
      PORT: "4005"
      BOOKING_SERVICE_URL: "http://booking-service"
      AWS_REGION: "us-east-1"
      APPLICATION_SECRETS_MANAGER_SECRET_ID: "smart-parking-dev-application-secrets"
      INTERNAL_API_KEY: "smartparking_internal_key"
      CRON_SCHEDULE: "* * * * *"
  deployment:
    name: scheduler-deploy
    replicas: 2
    selectorLabels:
      app: sps-scheduler
    podLabels:
      app: sps-scheduler
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 1
    containers:
      - name: scheduler-container
        image:
          repository: nimeshsv814/tf-scheduler-service
          tag: latest
        ports:
          - containerPort: 4005
        envFromConfigMaps:
          - scheduler-configmap
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
