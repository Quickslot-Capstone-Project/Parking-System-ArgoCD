paymentService:
  enabled: true
  configMap:
    name: payment-configmap
    data:
      PORT: "4004"
      AWS_REGION: "us-east-1"
      APPLICATION_SECRETS_MANAGER_SECRET_ID: "smart-parking-dev-application-secrets"
      APP_ENV: "dev"
      SQS_ENABLED: "false"
      NOTIFICATION_QUEUE_URL: ""
      INVOICE_QUEUE_URL: ""
      PAYMENT_TABLE: "smart-parking-payments"
      JWT_SECRET: "smartparking_super_secret"
      CORS_ORIGIN: "*"
      BOOKING_SERVICE_URL: "http://booking-service"
      NOTIFICATION_SERVICE_URL: "http://notification-service"
      INTERNAL_API_KEY: "smartparking_internal_key"
  deployment:
    name: payment-deploy
    replicas: 2
    selectorLabels:
      app: sps-payment
    podLabels:
      app: sps-payment
    strategy:
